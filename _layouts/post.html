<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }}</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; line-height: 1.6; }
        img { width: 100%; height: auto; margin: 20px 0; border-radius: 4px; }
        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
        .boton-volver { display: inline-block; margin-top: 30px; color: #000; font-weight: bold; text-decoration: none; border: 1px solid #000; padding: 10px 15px; }
    </style>
</head>
<body>
    <h1>{{ page.title }}</h1>
    <p><em>Fecha: {{ page.date | date_to_string }}</em></p>

    {{ content }}

    <div style="margin-top: 50px;">
        <hr>
        <h3>Comentarios</h3>
        <script src="https://utteranc.es/client.js"
                repo="patriciocardenasgon-svg/Geologia_Digital"
                issue-term="pathname"
                theme="github-light"
                crossorigin="anonymous"
                async>
        </script>
    </div>

    <div style="text-align: center; margin-top: 20px; margin-bottom: 50px;">
        <a href="{{ site.baseurl }}/" class="boton-volver" style="padding: 12px 25px; background-color: #333; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; display: inline-block;">← Volver al Inicio</a>
    </div>
</body>
</html>
